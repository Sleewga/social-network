<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
</head>
<body class="auth-page">
  <main class="auth-container">
    <div class="auth-box container">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account</p>

      <div id="error-msg" class="error-msg hidden"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="your_username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button id="login-btn" class="btn btn-primary">Sign in</button>
      <p class="auth-link">No account? <a href="register.html">Register</a></p>
    </div>
  </main>

  <script type="module" src="../scripts/profile/login.js"></script>
</body>
</html>
